<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.device_name }} Admin</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260707-maintenance-weekdays">
    <script src="/static/app.js?v=20260707-maintenance-weekdays" defer></script>
  </head>
  <body>
    <main class="shell">
      {% include "_topbar.html" %}
      {% include "_settings_toast.html" %}

      <div class="app-layout">
        {% include "_sidebar.html" %}
        <section class="content-stack">
          <form class="settings-stack" method="post" action="/settings">
            <input type="hidden" name="_return_to" value="/admin">
            <section class="panel settings-card">
              <div class="section-heading"><h2>Admin</h2></div>
              <div class="grid-two">
                <label><span>New password</span><input name="admin_password" type="password" autocomplete="new-password"></label>
                <label><span>Confirm password</span><input name="admin_password_confirm" type="password" autocomplete="new-password"></label>
              </div>
            </section>
            <section class="panel action-card">
              <button class="primary" type="submit">Save admin settings</button>
            </section>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
