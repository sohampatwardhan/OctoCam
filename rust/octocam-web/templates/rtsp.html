<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.device_name }} RTSP</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260707-maintenance-schedules">
    <script src="/static/app.js?v=20260707-maintenance-schedules" defer></script>
  </head>
  <body>
    <main class="shell">
      {% include "_topbar.html" %}
      {% include "_settings_toast.html" %}

      <div class="app-layout">
        {% include "_sidebar.html" %}
        <section class="content-stack">
          <form class="settings-stack" method="post" action="/settings">
            <input type="hidden" name="_return_to" value="/rtsp">
            <input type="hidden" name="_checkboxes" value="rtsp_enabled">
            <section class="panel settings-card">
              <div class="section-heading"><h2>RTSP</h2></div>
              <div class="toggle-row">
                <span>Service enabled</span>
                <label class="switch"><input type="checkbox" name="rtsp_enabled" {% if settings.rtsp_enabled %}checked{% endif %}><span></span></label>
              </div>
              <div class="grid-two">
                <label><span>HD path</span><input name="rtsp_path" value="{{ settings.rtsp_path }}" maxlength="80"></label>
                <label><span>HD max clients</span><input type="number" name="rtsp_max_clients" min="1" max="4" value="{{ settings.rtsp_max_clients }}"></label>
              </div>
              <div class="grid-two">
                <label><span>SD path</span><input name="sub_rtsp_path" value="{{ settings.sub_rtsp_path }}" maxlength="80"></label>
                <label><span>SD max clients</span><input type="number" name="sub_rtsp_max_clients" min="1" max="4" value="{{ settings.sub_rtsp_max_clients }}"></label>
              </div>
              {% if settings.rtsp_enabled %}
                <label>
                  <span>HD URL</span>
                  <span class="copy-row">
                    <input id="rtspUrl" class="url-field" value="{{ rtsp_urls.main }}" readonly>
                    <button class="icon-button copy-button" type="button" data-copy-target="rtspUrl" aria-label="Copy RTSP stream URL" title="Copy RTSP stream URL"></button>
                  </span>
                </label>
                {% if rtsp_urls.has_sub %}
                  <label>
                    <span>SD URL</span>
                    <span class="copy-row">
                      <input id="subRtspUrl" class="url-field" value="{{ rtsp_urls.sub }}" readonly>
                      <button class="icon-button copy-button" type="button" data-copy-target="subRtspUrl" aria-label="Copy RTSP SD stream URL" title="Copy RTSP SD stream URL"></button>
                    </span>
                  </label>
                {% endif %}
              {% endif %}
            </section>
            <section class="panel action-card">
              <button class="primary" type="submit">Save RTSP settings</button>
            </section>
          </form>
        </section>
      </div>
    </main>
  </body>
</html>
